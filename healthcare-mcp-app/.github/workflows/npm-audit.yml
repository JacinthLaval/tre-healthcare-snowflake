name: Weekly npm Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json 2>&1 || true
          VULN_COUNT=$(node -e "const r=require('./audit-results.json'); console.log(r.metadata?.vulnerabilities?.total || 0)")
          HIGH_COUNT=$(node -e "const r=require('./audit-results.json'); console.log((r.metadata?.vulnerabilities?.high || 0) + (r.metadata?.vulnerabilities?.critical || 0))")
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          echo "high_count=$HIGH_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create issue if vulnerabilities found
        if: steps.audit.outputs.vuln_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
            const vulns = audit.metadata?.vulnerabilities || {};
            const total = vulns.total || 0;
            const critical = vulns.critical || 0;
            const high = vulns.high || 0;
            const moderate = vulns.moderate || 0;
            const low = vulns.low || 0;

            const today = new Date().toISOString().split('T')[0];
            const title = `🔒 npm audit: ${total} vulnerabilities found (${today})`;

            const advisories = audit.vulnerabilities || {};
            let table = '| Package | Severity | Title |\n|---------|----------|-------|\n';
            for (const [name, info] of Object.entries(advisories)) {
              const sev = info.severity || 'unknown';
              const via = Array.isArray(info.via) ? info.via.filter(v => typeof v === 'object').map(v => v.title || v.name).join(', ') : '';
              table += `| ${name} | ${sev} | ${via} |\n`;
            }

            const body = [
              `## Weekly npm Audit Report — ${today}`,
              '',
              `| Critical | High | Moderate | Low | Total |`,
              `|----------|------|----------|-----|-------|`,
              `| ${critical} | ${high} | ${moderate} | ${low} | ${total} |`,
              '',
              '### Vulnerabilities',
              table,
              '',
              '### Remediation',
              '```',
              'npm audit fix        # safe fixes',
              'npm audit fix --force # breaking changes',
              '```',
              '',
              '_Auto-generated by weekly npm audit workflow_'
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,npm-audit'
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'npm-audit']
              });
            }
