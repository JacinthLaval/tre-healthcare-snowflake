verified_queries:
  - name: overall_survival_by_conditioning
    question: What is the overall survival rate by conditioning intensity in haploidentical transplants?
    sql: |
      SELECT 
        CASE CONDINT WHEN 1 THEN 'Myeloablative' WHEN 2 THEN 'Reduced Intensity' ELSE 'Unknown' END AS conditioning,
        COUNT(*) AS total_patients,
        SUM(CASE WHEN DEAD = 0 THEN 1 ELSE 0 END) AS alive,
        ROUND(100.0 * SUM(CASE WHEN DEAD = 0 THEN 1 ELSE 0 END) / COUNT(*), 1) AS survival_pct
      FROM TRE_HEALTHCARE_DB.OMOP_CDM.CIBMTR_HAPLOIDENTICAL_TRANSPLANT
      GROUP BY CONDINT
      ORDER BY conditioning
    verified_by: System
    verified_at: 1740528000

  - name: gvhd_rates_by_hla_e
    question: What are the GVHD rates by HLA-E genotype group?
    sql: |
      SELECT 
        HLAEGRP AS hla_e_group,
        COUNT(*) AS total_patients,
        SUM(GVHDGRP) AS gvhd_cases,
        ROUND(100.0 * SUM(GVHDGRP) / COUNT(*), 1) AS gvhd_rate_pct
      FROM TRE_HEALTHCARE_DB.OMOP_CDM.CIBMTR_HLA_E_OUTCOMES
      WHERE HLAEGRP IS NOT NULL
      GROUP BY HLAEGRP
      ORDER BY HLAEGRP
    verified_by: System
    verified_at: 1740528000

  - name: cd34_yield_by_collection_days
    question: Compare CD34+ cell yields between 1-day and 2-day PBSC collections
    sql: |
      SELECT 
        CASE TWODAYCOLL WHEN 1 THEN '2-Day Collection' ELSE '1-Day Collection' END AS collection_type,
        COUNT(*) AS collections,
        ROUND(AVG(TTL_CD34), 2) AS avg_cd34_yield,
        ROUND(AVG(GCSF_DSETTL), 2) AS avg_gcsf_dose
      FROM TRE_HEALTHCARE_DB.OMOP_CDM.CIBMTR_PBSC_COLLECTION
      WHERE TTL_CD34 IS NOT NULL
      GROUP BY TWODAYCOLL
      ORDER BY collection_type
    verified_by: System
    verified_at: 1740528000

  - name: tma_incidence_by_donor_type
    question: What is the TMA incidence rate by donor type?
    sql: |
      SELECT 
        DNRTYPE AS donor_type,
        COUNT(*) AS total_patients,
        SUM(TMA_EVENT) AS tma_cases,
        ROUND(100.0 * SUM(TMA_EVENT) / COUNT(*), 1) AS tma_rate_pct
      FROM TRE_HEALTHCARE_DB.OMOP_CDM.CIBMTR_TMA_OUTCOMES
      WHERE DNRTYPE IS NOT NULL
      GROUP BY DNRTYPE
      ORDER BY tma_rate_pct DESC
    verified_by: System
    verified_at: 1740528000

  - name: sickle_cell_survival_by_donor
    question: What are survival outcomes for sickle cell transplants by donor type?
    sql: |
      SELECT 
        DONORGP AS donor_group,
        COUNT(*) AS total_patients,
        SUM(CASE WHEN DEAD = 0 THEN 1 ELSE 0 END) AS alive,
        ROUND(100.0 * SUM(CASE WHEN DEAD = 0 THEN 1 ELSE 0 END) / COUNT(*), 1) AS survival_pct,
        ROUND(AVG(INTXSURV), 0) AS avg_followup_days
      FROM TRE_HEALTHCARE_DB.OMOP_CDM.CIBMTR_SICKLE_CELL_HCT
      GROUP BY DONORGP
      ORDER BY survival_pct DESC
    verified_by: System
    verified_at: 1740528000

  - name: infection_rates_by_conditioning
    question: What are post-transplant infection rates by conditioning intensity?
    sql: |
      SELECT 
        CASE CONDINT WHEN 1 THEN 'Myeloablative' WHEN 2 THEN 'Reduced Intensity' ELSE 'Unknown' END AS conditioning,
        COUNT(*) AS total_patients,
        ROUND(100.0 * SUM(BAC100GP) / COUNT(*), 1) AS bacterial_rate_pct,
        ROUND(100.0 * SUM(VIRAL100GP) / COUNT(*), 1) AS viral_rate_pct,
        ROUND(100.0 * SUM(FUNGAL100GP) / COUNT(*), 1) AS fungal_rate_pct
      FROM TRE_HEALTHCARE_DB.OMOP_CDM.CIBMTR_BACTERIAL_INFECTIONS
